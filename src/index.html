<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portfólio</title>
        <link rel="stylesheet" href="./output.css">
    </head>
    <body class="font-main">
        <!-- HEADER -->
        <header class="flex flex-row justify-between items-center px-8 py-9 bg-black text-white">
            <div class="flex flex-row items-center gap-4">
                <div class="size-12">
                    <img src="./img/logo.png" alt="Logo do site" />
                </div>
                <h1 class="text-4xl">Portfólio</h1>
            </div>
            <div class="size-8">
                <img src="./img/menu.png" alt=""/>
            </div>
        </header>
        <!-- HERO -->
         <section class="text-black px-6 py-16 bg-white">
            <div class="max-w-[400px] max-h-[400px]">
                <img 
                src="./img/sally.png" 
                alt="Imagem de um canguru marrom com adesivos coloridos presos à barriga, mascote Sally da byron.solutions."
                />
            </div>
            <div class="flex flex-col gap-12">
                <div class="text-center flex flex-col items-center gap-8">
                    <div class="flex flex-col gap-8">
                        <h2 class="text-5xl">Conheça a <span class="text-secondary"> Sally</span></h2>
                        <div class="flex flex-col gap-4">
                            <h3 class="text-2xl">A mascote da <span class="text-secondary"> byron.solutions</span>!</h3>
                            <p class="text-base">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Commodi eveniet provident perferendis voluptatem tempore incidunt nesciunt accusamus aut error hic.</p>
                        </div>
                    </div>
                    <button class="text-2xl font-semibold text-white bg-main px-4 py-2 rounded-2xl hover:bg-teal-600 transition duration-200">SAIBA MAIS</button>
                </div>
                <div class="flex flex-row justify-between items-center">
                    <p class="text-2xl">Nos contate!</p>
                    <div class="flex flex-row gap-6">
                        <div class="size-12">
                            <a href="#">
                                <img src="./img/logo_instagram.png" alt="logo verde da rede social instagram, uma câmera.">
                            </a>
                        </div>
                        <div class="size-12">
                            <a href="#">
                                <img src="./img/logo_linkedin.png" alt="logo verde da rede social linkedin, um quadrado oco com as letras 'in' dentro.">
                            </a>
                        </div>
                        <div class="size-12">
                            <a href="#">
                                <img src="./img/logo_whatsapp.png" alt="logo verde da rede social whatsapp, um balão de fala oco com um telefone dentro.">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
         </section>
    </body>
</html>
